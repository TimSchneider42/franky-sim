repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
        stages: [pre-commit]
    -   id: end-of-file-fixer
        stages: [pre-commit]
    -   id: check-yaml
        stages: [pre-commit]
    -   id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=10240]
    -   id: debug-statements
        stages: [pre-commit]
    -   id: check-merge-conflict
        stages: [pre-commit]

-   repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
    -   id: black
        language_version: python3
        files: ^(franky_sim|tests)/.*\.py$
        stages: [pre-commit]

-   repo: https://github.com/pycqa/isort
    rev: 9.0.0a3
    hooks:
    -   id: isort
        files: ^(franky_sim|tests)/.*\.py$
        stages: [pre-commit]

-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        additional_dependencies: [flake8-docstrings]
        files: ^(franky_sim|tests)/.*\.py$
        stages: [pre-commit]
